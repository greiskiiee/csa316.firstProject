name: CI

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Install dependencies
        working-directory: csa316/front
        run: npm install

      - name: Run ESLint
        working-directory: csa316/front
        run: npm run lint

      - name: Run Tests
        working-directory: csa316/front
        run: npm test
